# Configuration of the aster app
aster:
  # Configuration of APIs
  apis:
    # Configuration of the dingo API
    dingo:
      # Host of the API
      host: dingo.dingo.svc.cluster.local

      # Path of the API
      path: null

      # Port of the API
      port: 10101

      # Scheme of the API
      scheme: http

    # Configuration of the icanhazdadjoke API
    icanhazdadjoke:
      # Host of the API
      host: icanhazdadjoke.com

      # Path of the API
      path: null

      # Port of the API
      port: null

      # Scheme of the API
      scheme: https

    # Configuration of the pelican API
    pelican:
      # Host of the API
      host: pelican.pelican.svc.cluster.local

      # Path of the API
      path: null

      # Port of the API
      port: 10200

      # Scheme of the API
      scheme: http

  # Enable debug mode
  debug: true

  # Configuration of the server
  server:
    # Port to listen on
    port: 10110

# Configuration of the service
service:
  # Port to listen on
  port: 10110
