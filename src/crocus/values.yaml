# Configuration of the crocus app
crocus:
  # Configuration of APIs
  apis:
    # Configuration of the icanhazdadjoke API
    icanhazdadjoke:
      # Host of the API
      host: icanhazdadjoke.com

      # Path of the API
      path: null

      # Port of the API
      port: null

      # Scheme of the API
      scheme: https

    # Configuration of the scorpion API
    scorpion:
      # Host of the API
      host: scorpion.scorpion.svc.cluster.local

      # Path of the API
      path: null

      # Port of the API
      port: 20001

      # Scheme of the API
      scheme: http

  # Enable debug mode
  debug: true

  # Configuration of secrets
  secrets:
    # Shared secret containing 32 characters
    shared: XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX

  # Configuration of the server
  server:
    # Port to listen on
    port: 20020

  # Configuration of URLs
  urls:
    # Configuration of the orchid URL
    orchid:
      # Host of the URL
      host: localhost

      # Path of the URL
      path: null

      # Port of the URL
      port: 20120

      # Scheme of the URL
      scheme: http

# Configuration of the service
service:
  # Port to listen on
  port: 20020
